# Optional tailnet publication stack.
#
# This creates a dedicated Tailscale node named `kiempad` and exposes the
# stateless PWA over HTTPS at https://kiempad.<tailnet>.ts.net. Tailscale
# terminates TLS and proxies plain HTTP to the nginx static file server in the
# same network namespace. The app container stores no user data; Kiempad data
# remains encrypted in the browser's IndexedDB on each device.
#
# Usage:
#   TS_AUTHKEY=tskey-auth-... docker compose -f docker-compose.tailscale.yml up -d --build
#
# Prerequisites in the Tailscale admin console:
#   - MagicDNS enabled.
#   - HTTPS certificates enabled.
services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: kiempad-ts
    hostname: kiempad
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=kiempad
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ts_state:/var/lib/tailscale
      - ./ts/serve.json:/config/serve.json:ro
    ports:
      - "127.0.0.1:${KIEMPAD_TAILSCALE_LOCAL_PORT:-8088}:80"

  kiempad-web:
    build: .
    image: kiempad-web:latest
    container_name: kiempad-web
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      - tailscale

volumes:
  ts_state:
