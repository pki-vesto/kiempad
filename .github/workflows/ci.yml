name: CI

# Kiempad CI: faal een PR die de typecheck of tests breekt, in plaats van te
# vertrouwen op handmatige controle. Draait alleen op GitHub-hosted runners; geen
# secrets nodig (Kiempad is client-side en heeft geen backend/DB in CI).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'npm'
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint and format
        run: npm run lint
      - name: Secrets scan
        run: npm run secrets:check
      - name: Sensitive fixture scan
        run: npm run fixtures:check
      - name: Dossier cue parity smoke
        run: npm run test -- tests/ui/app-shell.integration.test.ts
      - name: Test
        run: npm run test
      - name: Central bootstrap smoke
        run: npm run smoke:central-bootstrap
      - name: Central health monitor annotation smoke
        run: npm run smoke:central-health-monitor
      - name: Bootstrap governance freshness
        run: npm run governance:bootstrap
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Split workspace smoke
        run: npm run smoke:split-workspaces
      - name: Context signals visual smoke
        run: npm run smoke:context-signals
      - name: Routeflow screenshot smoke
        run: npm run smoke:routeflows
      - name: External asset scan
        run: npm run assets:check
