services:
  kiempad-central-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      KIEMPAD_CENTRAL_HOST: 0.0.0.0
      KIEMPAD_CENTRAL_PORT: 8099
      KIEMPAD_CENTRAL_PERSISTENCE_FILE: /data/kiempad-central-db.json
      KIEMPAD_CENTRAL_SESSION_TTL_MS: ${KIEMPAD_CENTRAL_SESSION_TTL_MS:-3600000}
      KIEMPAD_CENTRAL_MAX_REQUEST_BODY_BYTES: ${KIEMPAD_CENTRAL_MAX_REQUEST_BODY_BYTES:-26214400}
      KIEMPAD_CENTRAL_ALLOWED_USER_IDS: ${KIEMPAD_CENTRAL_ALLOWED_USER_IDS:-kiempad-private-user}
      KIEMPAD_CENTRAL_ALLOWED_ORIGINS: ${KIEMPAD_CENTRAL_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4174,http://127.0.0.1:4174}
    ports:
      - "127.0.0.1:${KIEMPAD_CENTRAL_LOCAL_PORT:-8099}:8099"
    restart: unless-stopped
    volumes:
      - kiempad_central_data:/data

volumes:
  kiempad_central_data:
